services:
  runtime:
    image: alex-runtime:local
    build:
      context: ../..
      dockerfile: web/rbx-runtime-runner/Dockerfile
    ports:
      - "${ALEX_RUNTIME_PORT:-8795}:8791"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 768m
    cpus: 2.0
